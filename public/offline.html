<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sem conexão</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 24px;
        }
        svg { width: 56px; height: 56px; margin-bottom: 20px; opacity: 0.8; }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        p { font-size: 14px; color: #999; margin-bottom: 24px; }
        button {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path fill="currentColor" d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
    </svg>
    <h1>Sem conexão com a internet</h1>
    <p>Verifique sua rede e tente novamente</p>
    <button onclick="window.location.reload()">Tentar novamente</button>

    <script>
        // Recarrega automaticamente se a conexão voltar
        window.addEventListener('online', () => window.location.reload())
    </script>
</body>
</html>
